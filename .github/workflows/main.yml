name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    
    - name: Use Node.js 20.x
      uses: actions/setup-node@v3
      with:
        node-version: '20.x'
        
    - name: Kurulum ve Linting
      run: |
        npm install
        # npm run lint (Projede ESLint varsa)
        
    - name: Test (Mock Binary Analizi)
      run: |
        dd if=/dev/urandom of=test_binary.bin bs=1M count=5
        echo "https://gizli-hedef.com API_KEY=AKIAIOSFODNN7EXAMPLE" >> test_binary.bin
        node src/extractor.js test_binary.bin --json
        cat report.json | grep "gizli-hedef"
        
    - name: Docker Build (If Tests Pass)
      run: docker build -t string-extractor:latest .
